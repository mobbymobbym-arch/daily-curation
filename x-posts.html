，因此你可以直接將警示、部署掛鉤（deploy hooks）或內部工具指向 Claude。試著向 Claude 發送一個警示內容（payload），並要求它找出負責的服務，並在 #oncall 頻道發送初步評估摘要。\n發送（POST）一則訊息並收到回傳的…", "show_google_news_badge": true, "repost_label": null, "is_failed": false}, {"handle": "claudeai", "accent": "#10b981", "display_time": "2026.04.15 00:47", "status": "text_extracted", "post_url": "https://x.com/claudeai/status/2044095086460309790", "primary_text": "Now in research preview: routines in Claude Code.\nConfigure a routine once (a prompt, a repo, and your connectors), and it can run on a schedule, from an API call, or in response to an event.\nRoutines run on our web infrastructure, so you don't have to keep your laptop open. pic.twitter.com/m2XJWYqkf8", "translation": "Claude Code 推出研究預覽版新功能：routines。\n設定一次 routine（包含 prompt、repo 與你的 connectors），它就能按照排程、透過 API 調用或因應事件來執行。\nRoutines 運行在我們的網頁基礎架構上，因此你不需要一直開著筆記型電腦。", "show_google_news_badge": false, "repost_label": null, "is_failed": false}, {"handle": "a16z", "accent": "#7c3aed", "display_time": "2026.04.14 23:28", "status": "text_extracted", "post_url": "https://x.com/a16z/status/2044075449698107603", "primary_text": "With states driving AI governance in the U.S., the constitutional limits on their authority will shape the regulatory landscape.\nOur judicial process requires cost-benefit analysis to determine how Congress can regulate interstate commerce.\nBut there's an evidence gap: the data… https://t.co/o9NaVtNzKe pic.twitter.com/r7U2DZYSO3", "translation": "隨著美國各州推動 AI 治理，其權限的憲法限制將塑造監管格局。\n我們的司法程序需要成本效益分析，以決定國會如何監管州際貿易。\n但目前存在證據缺口：數據⋯", "show_google_news_badge": false, "repost_label": null, "is_failed": false}, {"handle": "pmarca", "accent": "#c2410c", "display_time": "2026.04.14 22:35", "status": "text_extracted", "post_url": "https://x.com/pmarca/status/2044061995469550031", "primary_text": "Many people are saying. https://t.co/gnJkXZijeK", "translation": "很多人都這麼說。", "show_google_news_badge": false, "repost_label": null, "is_failed": false}, {"handle": "paulg", "accent                 return '<span class="link-btn link-btn-disabled">未還原網址</span>';
            }
            return `<a href="${escapeHtml(row.post_url)}" class="link-btn" style="color: ${escapeHtml(row.accent)};">Open on X &rarr;</a>`;
        }

        function buildCardHtml(row) {
            const failedClass = row.is_failed ? " x-card-failed" : "";
            return `
                <article class="x-card${failedClass}" style="border-top: 6px solid ${escapeHtml(row.accent)};">
                    <div class="card-top">
                        <div>
                            <div class="handle-row">
                                <span class="handle-chip" style="background: ${escapeHtml(row.accent)};">@${escapeHtml(row.handle)}</span>
                                ${buildBadgeHtml(row)}
                            </div>
                            <div class="meta-time">${escapeHtml(row.display_time)}</div>
                        </div>
                        ${buildLinkHtml(row)}
                    </div>
                    <div class="text-stack">
                        <div class="panel-body">${escapeHtml(row.primary_text)}</div>
                        <div class="translation-divider"></div>
                        <div class="panel-body translation-body">${escapeHtml(row.translation)}</div>
                    </div>
                </article>
            `;
        }

        function renderFeed() {
            const visibleRows = allRows.slice(0, visibleCount);
            grid.innerHTML = visibleRows.map(buildCardHtml).join("");
            feedCount.textContent = `目前顯示 ${visibleRows.length} / ${allRows.length}`;
            loadMoreBtn.hidden = visibleCount >= allRows.length;
        }

        loadMoreBtn.addEventListener("click", () => {
            visibleCount = Math.min(visibleCount + LOAD_MORE_COUNT, allRows.length);
            renderFeed();
        });

        renderFeed();
    </script>
</body>
</html>
