erson down that road.", "translation": "此外，你的非 AI 點子很有可能最後還是會變成 AI 點子，因為你以後會發現有某種方法可以利用 AI 將其潛力提升 10 倍。而你將會是那條路上唯一的人。", "show_google_news_badge": false, "repost_label": null, "is_failed": false}, {"handle": "paulg", "accent": "#f59e0b", "display_time": "2026.04.24 23:02", "status": "text_extracted", "post_url": "https://x.com/paulg/status/2047692744089313563", "primary_text": "The biggest opportunity for would-be startup founders is AI. But the most underpriced opportunity is probably non-AI ideas. So if you have a good non-AI idea, go for it, because everyone else is going to overlook it.", "translation": "對於未來的創業家來說，最大的機會是 AI。但最被低估的機會可能是非 AI 的點子。所以如果你有一個好的非 AI 點子，就去做吧，因為其他人都會忽視它。", "show_google_news_badge": false, "repost_label": null, "is_failed": false}, {"handle": "paulg", "accent": "#f59e0b", "display_time": "2026.04.24 22:44", "status": "text_extracted", "post_url": "https://x.com/paulg/status/2047688081327689992", "primary_text": "The reason of course is Blake's brilliant idea to fund the airliner by selling gas turbines to data centers. I can't think of another move that has turned the tables on investors so thoroughly. And now that Boom doesn't need investors anymore, investors want in. So it is always.", "translation": "原因當然是 Blake 的絕妙點子：透過向資料中心銷售燃氣渦輪機來資助客機計畫。我想不出還有哪個舉動能如此徹底地反轉與投資人的關係。現在 Boom 不再需要投資人了，投資人反而想加入了。向來如此。", "show_google_news_badge": false, "repost_label": null, "is_failed": false}, {"handle": "paulg", "accent": "#f59e0b", "display_time": "2026.04.24 22:41", "status": "text_extracted", "post_url": "https://x.com/paulg/status/2047687279137771573", "primary_text": "Boom always used to have hard time raising money. Investors are terrified of funding anything that's not like existing hot startups. And now, after 10 years of lean times, I'm getting unsolicited offers to buy Boom shares. It's so great.", "translation": "Boom 過去募資總是很困難。投資人對於資助任何與現有熱門新創不同的東西感到恐懼。而現在，在經歷了 10 年的枯竭期後，我收到了不請自來的 Boom 股份購買要約。這太棒了。", "show_google_news_badge": false, "repost_l ge": false, "repost_label": null, "is_failed": false}, {"handle": "sama", "accent": "#dc2626", "display_time": "2026.04.24 02:18", "status": "text_extracted", "post_url": "https://x.com/sama/status/2047379615589777666", "primary_text": "1. We believe in iterative deployment; although GPT-5.5 is already a smart model, we expect rapid improvements. Iterative deployment is a big part of our safety strategy; we believe the world will be best equipped to win at the team sport of AI resilience this way.\n2. We believe…", "translation": "1. 我們相信迭代部署；雖然 GPT-5.5 已經是一個聰明的模型，但我們預期會有快速的進步。迭代部署是我們安全策略的重要組成部分；我們相信透過這種方式，世界將能更好地準備好在 AI 韌性這場團隊運動中勝出。\n2. 我們相信…", "show_google_news_badge": true, "repost_label": null, "is_failed": false}, {"handle": "sama", "accent": "#dc2626", "display_time": "2026.04.24 02:16", "status": "text_extracted", "post_url": "https://x.com/sama/status/2047379036419014928", "primary_text": "API pricing will be $5 per 1 million input tokens and $30 per 1 million output tokens, with a 1 million context window.\n(Remember, you will need less tokens per task than 5.4!)", "translation": "API 定價將為每 100 萬個 input tokens 5 美元，以及每 100 萬個 output tokens 30 美元，並提供 100 萬的 context window。\n（請記住，每個任務所需的 tokens 會比 5.4 還少！）", "show_google_news_badge": false, "repost_label": null, "is_failed": false}, {"handle": "sama", "accent": "#dc2626", "display_time": "2026.04.24 02:13", "status": "text_extracted", "post_url": "https://x.com/sama/status/2047378431260664058", "primary_text": "Also, a ton of new Codex features coming soon! Fun little bundle w/the new model.", "translation": "此外，大量的 Codex 新功能即將推出！隨新模型一同發布的小組合會很有趣。", "show_google_news_badge": false, "repost_label": null, "is_failed": false}, {"handle": "sama", "accent": "#dc2626", "display_time": "2026.04.24 02:13", "status": "text_extracted", "post_url": "https://x.com/sama/status/2047378253313106112", "primary_text": "GPT-5.5 is here! We hope it's useful to you. I personally like it.", "translation": "GPT-5.5 來了！我們希望它對你有幫助。我個人很喜歡它。", "show_google_news_badge": false, "repost_label": null, "is_failed": false}, {"handle": "sama", "accent": "#dc2626", "display_time": "2026.04.24 02:13", "status": "text_extracted", "post_url": "https://x.com/sama/status/2047378254575685707", "primary_text": "It is smart and fast; per-token speed matches 5.4 and it uses significantly fewer tokens per task.\nIn my experience, it \"gets what to do\".\nRolling out today in ChatGPT and Codex. We are working with API customers on security and safeguards and plan to launch in API very soon.", "translation": "它既聰明又快速；每 token 速度與 5.4 相當，且每個任務使用的 token 數量顯著減少。\n根據我的經驗，它「很懂該怎麼做」。\n今天起在 ChatGPT 和 Codex 逐步推出。我們正與 API 客戶合作加強安全與防護機制，並計劃很快在 API 上線。", "show_google_news_badge": false, "repost_label": null, "is_failed": false}, {"handle": "OpenAI", "accent": "#8b5cf6", "display_time": "2026.04.24 02:06", "status": "text_extracted", "post_url": "https://x.com/OpenAI/status/2047376568809636017", "primary_text": "GPT-5.5 is rolling out today for Plus, Pro, Business and Enterprise users across ChatGPT and Codex.\nWe’re also introducing GPT-5.5 Pro for Pro, Business, and Enterprise users in ChatGPT.", "translation": "GPT-5.5 即日起向 ChatGPT 和 Codex 的 Plus、Pro、Business 及 Enterprise 用戶開放。\n我們也為 ChatGPT 的 Pro、Business 和 Enterprise 用戶推出 GPT-5.5 Pro。", "show_google_news_badge": false, "repost_label": null, "is_failed": false}, {"handle": "OpenAI", "accent": "#8b5cf6", "display_time": "2026.04.24 02:06", "status": "text_extracted", "post_url": "https://x.com/OpenAI/status/2047376564309115134", "primary_text": "GPT-5.5 delivers this step up in intelligence without compromising on speed.\nGPT-5.5 matches GPT-5.4 per-token latency in real-world serving, while performing better across nearly every evaluation we measured.\nIt also uses significantly fewer tokens to complete the same Codex… pic.twitter.com/5mR46SM7mW", "translation": "GPT-5.5 在提升智慧水平的同時並未犧牲速度。GPT-5.5 在實際服務中的單個 Token 延遲與 GPT-5.4 相當，但在我們測量的幾乎所有評估中表現都更出色。它完成相同的 Codex 也使用了明顯更少的 Token… pic.twitter.com/5mR46SM7mW", "show_google_news_badge": false, "repost_label": null, "is_failed": false}, {"handle": "OpenAI", "accent": "#8b5cf6", "display_time": "2026.04.24 02:06", "status": "text_extracted", "post_url": "https://x.com/OpenAI/status/2047376567559668222", "primary_text": "In ChatGPT, full-stack inference improvements enable a more capable model at faster speed. This efficiency is a game-changer for GPT-5.5 Pro, now a much more practical option for demanding tasks, and a step change in the level of difficulty and quality of work ChatGPT can take on…", "translation": "在 ChatGPT 中，全棧推理改進讓能力更強的模型能以更快的速度運行。這種效率對於 GPT-5.5 Pro 來說是個遊戲規則改變者，現在它已成為處理高需求任務中更具實用性的選擇，也是 ChatGPT 所能承擔的任務難度與工作品質的一個跨越式進步…", "show_google_news_badge": true, "repost_label": null, "is_failed": false}, {"handle": "OpenAI", "accent": "#8b5cf6", "display_time": "2026.04.24 02:06", "status": "text_extracted", "post_url": "https://x.com/OpenAI/status/2047376561205325845", "primary_text": "Introducing GPT-5.5\nA new class of intelligence for real work and powering agents, built to understand complex goals, use tools, check its work, and carry more tasks through to completion. It marks a new way of getting computer work done.\nNow available in ChatGPT and Codex. pic.twitter.com/rPLTk99ZH5", "translation": "隆重推出 GPT-5.5\n一種為實際工作和驅動 Agent 而生的新一代智慧，旨在理解複雜目標、使用工具、檢查自身工作，並引導更多任務順利完成。這標誌著電腦工作處理方式的新紀元。\n現在已在 ChatGPT 和 Codex 中推出。 pic.twitter.com/rPLTk99ZH5", "show_google_news_badge": false, "repost_label": null, "is_failed": false}, {"handle": "OpenAI", "accent": "#8b5cf6", "display_time": "2026.04.24 02:06", "status": "text_extracted", "post_url": "https://x.com/OpenAI/status/2047376562916581513", "primary_text": "GPT-5.5 excels at writing and debugging code, researching online, analyzing data, creating documents and spreadsheets, operating software, and moving across tools until a task is finished.\nThe gains are especially clear in agentic coding, computer use, knowledge work, and early…", "tra     <script>
        const INITIAL_VISIBLE_COUNT = 50;
        const LOAD_MORE_COUNT = 25;
        const allRows = JSON.parse(document.getElementById("x-post-rows").textContent);
        const grid = document.getElementById("feed-grid");
        const loadMoreBtn = document.getElementById("load-more-btn");
        const feedCount = document.getElementById("feed-count");
        let visibleCount = Math.min(INITIAL_VISIBLE_COUNT, allRows.length);

        function escapeHtml(value) {
            return String(value ?? "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#39;");
        }

        function buildBadgeHtml(row) {
            const badges = [];
            if (row.show_google_news_badge) {
                badges.push('<span class="badge badge-warn">Google News 公開節錄</span>');
            }
            if (row.repost_label) {
                badges.push(`<span class="badge badge-info">${escapeHtml(row.repost_label)}</span>`);
            }
            return badges.join("");
        }

        function buildLinkHtml(row) {
            if (row.is_failed || !row.post_url) {
                return '<span class="link-btn link-btn-disabled">未還原網址</span>';
            }
            return `<a href="${escapeHtml(row.post_url)}" class="link-btn" style="color: ${escapeHtml(row.accent)};">Open on X &rarr;</a>`;
        }

        function buildCardHtml(row) {
            const failedClass = row.is_failed ? " x-card-failed" : "";
            return `
                <article class="x-card${failedClass}" style="border-top: 6px solid ${escapeHtml(row.accent)};">
                    <div class="card-top">
                        <div>
                            <div class="handle-row">
                                <span class="handle-chip" style="background: ${escapeHtml(row.accent)};">@${escapeHtml(row.handle)}</span>
                                ${buildBadgeHtml(row)}
                            </div>
                            <div class="meta-time">${escapeHtml(row.display_time)}</div>
                        </div>
                        ${buildLinkHtml(row)}
                    </div>
                    <div class="text-stack">
                        <div class="panel-body">${escapeHtml(row.primary_text)}</div>
                        <div class="translation-divider"></div>
                        <div class="panel-body translation-body">${escapeHtml(row.translation)}</div>
                    </div>
                </article>
            `;
        }

        function renderFeed() {
            const visibleRows = allRows.slice(0, visibleCount);
            grid.innerHTML = visibleRows.map(buildCardHtml).join("");
            feedCount.textContent = `目前顯示 ${visibleRows.length} / ${allRows.length}`;
            loadMoreBtn.hidden = visibleCount >= allRows.length;
        }

        loadMoreBtn.addEventListener("click", () => {
            visibleCount = Math.min(visibleCount + LOAD_MORE_COUNT, allRows.length);
            renderFeed();
        });

        renderFeed();
    </script>
